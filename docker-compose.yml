services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  # Loops a sample file as an RTSP source so no real camera is needed.
  mediamtx:
    image: bluenviron/mediamtx:latest
    volumes:
      - ./infra/mediamtx.yml:/mediamtx.yml
      - ./infra/sample:/sample
    ports:
      - "8554:8554"

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      - redis
      - mediamtx
      - backend
    # WebRTC needs a predictable UDP port range for media; host networking
    # is the simplest reliable option for local dev.
    network_mode: host

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
